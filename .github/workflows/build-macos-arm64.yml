name: Build macOS ARM64 Package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-15
    timeout-minutes: 30
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Check Out Fork
        uses: actions/checkout@v6

      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Check Source
        run: npm run check

      - name: Build Production Application
        run: npm run build:prod

      - name: Package macOS ARM64
        run: npx electron-builder --mac dmg --arm64 --publish never

      - name: Create SHA-256 Checksum
        run: |
          cd release
          shasum -a 256 ./*.dmg > SHA256SUMS-macos-arm64.txt

      - name: Upload macOS ARM64 Package
        uses: actions/upload-artifact@v6
        with:
          name: video-hub-app-sin-${{ github.sha }}-macos-arm64
          path: |
            release/*.dmg
            release/SHA256SUMS-macos-arm64.txt
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
