name: Build Debian AMD64 Test Package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debian-amd64:
    name: Build Debian AMD64
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check Out Fork
        uses: actions/checkout@v6

      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Check Source
        run: npm run check

      - name: Build Production Application
        run: npm run build:prod

      - name: Package Debian AMD64
        run: npx electron-builder --linux deb --x64 --publish never

      - name: Create SHA-256 Checksum
        run: |
          cd release
          sha256sum ./*.deb > SHA256SUMS-debian-amd64.txt

      - name: Upload Debian AMD64 Package
        uses: actions/upload-artifact@v6
        with:
          name: Video-Hub-App-SIN-${{ github.sha }}-debian-amd64
          path: |
            release/*.deb
            release/SHA256SUMS-debian-amd64.txt
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
