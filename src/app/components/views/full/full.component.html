<div
  class="meta-container"
  [ngStyle]="{
    height: (isImportFailure() ? _imgHeight : rowOffsets.length * _imgHeight) + 30 + 'px',
    width: computedWidth + 'px'
  }"
  >
  <!-- the 30 px added above is the padding for the text  -->

@if (showFavorites()) {
  <app-icon
    (click)="toggleHeart($event)"
    class="heart"
    [ngClass]="{ 'heart-lit' : video().stars === 5.5 }"
    [icon]="'icon-heart'"
   />
}

@if (isImportFailure()) {
  <div
    (click)="videoClick.emit({ mouseEvent: $event })"
    (dblclick)="videoClick.emit({ mouseEvent: $event, doubleClick: true })"
    (contextmenu)="rightClick.emit({ mouseEvent: $event, item: video() })"
    class="filmstrip-container import-error-placeholder"
    [ngStyle]="{ height: _imgHeight + 'px' }"
    title="import_error"
  >
    <app-icon [icon]="'icon-video-x'" [size]="32" />
    <span>import_error</span>
  </div>
}

@for (row of rowOffsets; track row) {
  <div
    (click)="   videoClick.emit({ mouseEvent: $event })"
    (dblclick)="videoClick.emit({ mouseEvent: $event, doubleClick: true })"
    (contextmenu)="rightClick.emit({ mouseEvent: $event, item: video() })"
    class="filmstrip-container"
    [ngStyle]="{
        height: _imgHeight + 'px',
        'background-image': 'url(' + fullFilePath + ')',
        'background-position-x': '-' + (row * _imgHeight * 16 / 9) + 'px',
        'background-size': 'auto ' + _imgHeight + 'px'
      }"
  ></div>
}

@if (video().selected) {
  <app-icon class="selected" [icon]="'icon-show-more-info'" />
}

@if (showMeta()) {
  <span
    [ngClass]="{ 'larger-font': largerFont() }"
    [ngStyle]="{ color: darkMode() ? '#BBBBBB' : '#000000' }"
    class="title"
  >
    {{ video().cleanName }}
  </span>
}

</div>
